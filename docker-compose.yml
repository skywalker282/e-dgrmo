version: '3.8'

services:
  app:
    image: labs.salemcapital.cd/salem/e-dgrmo:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4001:3000"
    environment:
      - NODE_ENV=${NODE_ENV}
    restart: always
    networks:
      - e-dgrmonet

networks:
  e-dgrmonet:
    driver: bridge
